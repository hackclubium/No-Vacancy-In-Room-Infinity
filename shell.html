<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Vacancy in Room Infinity</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0812;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #dcd2c8;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            image-rendering: auto;
            max-width: 100%;
            max-height: 100%;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        #loading h1 {
            font-size: 24px;
            color: #c8b478;
            margin-bottom: 10px;
        }

        #loading p {
            font-size: 14px;
            color: #8c8278;
        }

        .spinner {
            border: 3px solid #3c2d3c;
            border-top: 3px solid #c8b478;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
        <div id="loading">
            <h1>NO VACANCY</h1>
            <p>IN ROOM INFINITY</p>
            <div class="spinner"></div>
            <p>Loading the front desk...</p>
        </div>
    </div>
    <script>
        var Module = {
            canvas: (function() { return document.getElementById('canvas'); })(),
            onRuntimeInitialized: function() {
                document.getElementById('loading').style.display = 'none';
                console.log('Front desk is ready. Welcome to your shift.');
            }
        };
        {{{ SCRIPT }}}
    </script>
</body>
</html>
